<!DOCTYPE html>
<html>
<head>
    <title>Baebuu & Bubu ❤️</title>
    <link rel="stylesheet" href="style.css">

    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">
<body>
    <div id="memory-card" style="display:none;">     
    <h2>❤️ First Ride & Proposal</h2>

    <img
        id="memory-image"
        src=""
        width="300"
    >

    <p id="memory-text"></p>

    <button onclick="closeMemory()">
        Continue
    </button>
</div>
<div id="controls">
    <button id="left">⬅️</button>
    <button id="up">⬆️</button>
    <button id="down">⬇️</button>
    <button id="right">➡️</button>
</div>
<audio
    id="bgMusic"
    loop
>
    <source
        src="assets/music/our_song.mp3"
        type="audio/mpeg">
</audio>

<button
    id="musicBtn"
    style="
        position:absolute;
        top:10px;
        right:10px;
        z-index:1000;
    ">
    🎵 Play Music
</button>
    <div id="startScreen">

    <h1>❤️ Baebuu & Bubu ❤️</h1>

    <h3>Our Memories Adventure</h3>

    <p>
        Every memory with you
        became part of my life.
    </p>

    <button id="startBtn">
        Begin Our Journey ❤️
    </button>

</div>
    <script src="game.js"></script>

</body>
</html>
